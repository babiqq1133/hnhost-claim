name: 🎮 HnHost 每日领取金币

on:
  schedule:
    - cron: '0 1 * * *'   # 每天 UTC 01:00 = 北京时间 09:00
  workflow_dispatch:

jobs:
  claim:
    name: 🪙 执行每日领币
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 拉取代码（包含 storageState.json）
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/HnHost-Claim
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          fetch-depth: 0          # 重要：确保拉取所有文件

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 安装依赖
        run: npm install

      - name: 🌐 安装 Playwright 浏览器
        run: npx playwright install chromium --with-deps

      - name: 🛡️ 启动 GOST 代理转发
        if: ${{ env.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v\( {VERSION}/gost_ \){VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          echo "✅ GOST 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org \
            | sed 's/\([0-9]*\.[0-9]*\.[0-9]*\.\)[0-9]*/\1**/g'

      - name: 🚀 运行领币脚本
        env:
          TG_BOT:        ${{ secrets.TG_BOT }}
          GOST_PROXY:    http://127.0.0.1:8080
        run: npx playwright test tests/hnhost-claim.spec.js

      - name: 📸 上传失败截图和日志
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: |
            test-results/
            hnhost_claim_*.png
            gost.log
          retention-days: 7

      - name: 📋 检查 storageState.json 是否存在
        if: always()
        run: |
          if [ -f "storageState.json" ]; then
            echo "✅ storageState.json 文件存在"
            ls -l storageState.json
          else
            echo "❌ storageState.json 文件不存在！"
            echo "请在本地运行：node tests/save-discord-login.js"
            echo "生成后把 storageState.json 上传到仓库。"
          fi
