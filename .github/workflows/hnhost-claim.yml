name: 🎮 HnHost 每日领取金币

on:
  schedule:
    - cron: '0 1 * * *'   # 北京时间早上 9:00
  workflow_dispatch:

jobs:
  claim:
    name: 🪙 执行每日领币
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 拉取私库代码
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/HnHost-Claim
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 📦 安装依赖
        run: npm ci   # 推荐使用 npm ci 而不是 npm install

      - name: 🌐 安装 Playwright 浏览器
        run: npx playwright install chromium --with-deps

      - name: 🛡️ 启动 GOST 代理转发
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          if [ -z "$GOST_PROXY" ]; then
            echo "⚠️ 未设置 GOST_PROXY 密钥，跳过代理启动"
          else
            echo "📦 正在下载并启动 GOST..."
            VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
            wget -q "https://github.com/ginuerzh/gost/releases/download/v\( {VERSION}/gost_ \){VERSION}_linux_amd64.tar.gz"
            tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
            chmod +x gost
            
            nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
            sleep 5
            
            echo "✅ GOST 已启动，测试出口 IP："
            curl -s -x http://127.0.0.1:8080 https://api.ipify.org || echo "IP 检查失败"
          fi

      - name: 🚀 运行领币脚本
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          TG_BOT:        ${{ secrets.TG_BOT }}
          TG_CHAT_ID:    ${{ secrets.TG_CHAT_ID }}
          HTTP_PROXY:    http://127.0.0.1:8080
          HTTPS_PROXY:   http://127.0.0.1:8080
        run: npx playwright test tests/hnhost-claim.spec.js --project=chromium

      - name: 📸 上传失败截图和报告
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: |
            test-results/
            playwright-report/
          retention-days: 7
